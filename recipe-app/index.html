<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מתכונים שלי</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#c0622a" />
  <link rel="icon" href="icons/icon-512.png" type="image/png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="מתכונים" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fdf8f0;
      --card: #ffffff;
      --primary: #c0622a;
      --primary-light: #f5ece3;
      --primary-dark: #9e4f22;
      --text: #2c1a0e;
      --text-muted: #7a5c44;
      --border: #e8d8c8;
      --tag-bg: #fde8d8;
      --tag-text: #8b3a1a;
      --step-num: #c0622a;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 16px;
    }

    body {
      font-family: 'Segoe UI', 'Arial Hebrew', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── Header ── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 20px 24px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.02em; }
    header p  { font-size: 0.85rem; opacity: 0.85; margin-top: 2px; }

    /* ── Search ── */
    .search-bar {
      padding: 16px 20px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .search-bar input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s;
    }
    .search-bar input:focus { border-color: var(--primary); }

    /* ── Recipe list ── */
    .recipe-list {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .recipe-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1.5px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .recipe-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.12); transform: translateY(-1px); }

    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
    }
    .card-icon {
      font-size: 2.2rem;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--primary-light);
      border-radius: 12px;
      flex-shrink: 0;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .card-meta span { display: flex; align-items: center; gap: 3px; }
    .card-chevron {
      font-size: 1.1rem;
      color: var(--text-muted);
      transition: transform 0.25s;
      flex-shrink: 0;
    }
    .recipe-card.open .card-chevron { transform: rotate(90deg); }

    .card-tags {
      padding: 0 18px 12px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tag {
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
    }

    /* ── Expanded recipe body ── */
    .recipe-body {
      display: none;
      border-top: 1.5px solid var(--border);
    }
    .recipe-card.open .recipe-body { display: block; }

    .recipe-body section {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
    }
    .recipe-body section:last-child { border-bottom: none; }

    .section-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--primary);
      margin-bottom: 10px;
    }

    /* ingredients */
    .ingredient-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ingredient-list li {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 0.9rem;
      gap: 8px;
    }
    .ingredient-list li .name { color: var(--text); flex: 1; }
    .ingredient-list li .amount {
      font-weight: 700;
      color: var(--primary-dark);
      white-space: nowrap;
    }

    /* steps */
    .step-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .step-list li {
      display: flex;
      gap: 12px;
      font-size: 0.9rem;
      line-height: 1.55;
    }
    .step-num {
      width: 24px;
      height: 24px;
      min-width: 24px;
      background: var(--primary);
      color: #fff;
      border-radius: 50%;
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }

    /* tip box */
    .tip-box {
      background: #fff8ee;
      border-right: 4px solid #e8a84e;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      color: #6b4a10;
      line-height: 1.55;
    }
    .tip-box strong { color: #8b5e10; }

    /* baking info pills */
    .bake-info {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .bake-pill {
      background: var(--primary-light);
      border: 1.5px solid #e8c4a8;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.88rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex: 1;
      min-width: 90px;
    }
    .bake-pill .pill-label { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
    .bake-pill .pill-val { font-weight: 700; color: var(--primary-dark); font-size: 1rem; }

    /* ── FAB – add recipe ── */
    #fab {
      position: fixed;
      bottom: 24px;
      left: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-size: 1.8rem;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(192,98,42,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
      z-index: 200;
    }
    #fab:hover { background: var(--primary-dark); transform: scale(1.07); }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 300;
      align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 36px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.28s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: 18px; color: var(--primary-dark); }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--bg);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--primary); }

    .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
    .btn-primary {
      flex: 1;
      padding: 12px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary {
      padding: 12px 20px;
      background: var(--bg);
      color: var(--text-muted);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.95rem; }

    /* ── Tag filter bar ── */
    .tag-bar {
      padding: 10px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 7px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .tag-bar::-webkit-scrollbar { display: none; }
    .tag-filter-btn {
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 0.76rem;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid transparent;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.17s;
      flex-shrink: 0;
    }
    .tag-filter-btn:hover { border-color: var(--primary); }
    .tag-filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* Clickable tags on cards */
    .tag { cursor: pointer; transition: background 0.15s, color 0.15s; }
    .tag:hover { background: var(--primary); color: #fff; }
    .tag.active-tag { background: var(--primary); color: #fff; }

    /* ── Attachments section ── */
    .attach-section { padding: 14px 18px; }
    .attach-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; align-items: flex-start; }
    .attach-thumb-wrap, .attach-pdf-wrap { position: relative; }
    .attach-thumb {
      width: 72px; height: 72px; object-fit: cover;
      border-radius: 8px; border: 1.5px solid var(--border);
      cursor: pointer; display: block;
    }
    .attach-pdf-card {
      display: flex; align-items: center; gap: 6px;
      background: var(--primary-light); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 7px 10px;
      font-size: 0.78rem; color: var(--primary-dark); font-weight: 600;
      text-decoration: none; max-width: 170px;
    }
    .attach-pdf-card .pdf-icon { font-size: 1.3rem; flex-shrink: 0; }
    .attach-pdf-name {
      overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; display: block;
    }
    .attach-delete {
      position: absolute; top: -5px; right: -5px;
      width: 18px; height: 18px; background: #e53935; color: #fff;
      border: none; border-radius: 50%; font-size: 0.6rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      line-height: 1; z-index: 1;
    }
    .attach-upload-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 7px 12px; background: var(--bg);
      border: 1.5px dashed var(--primary); border-radius: 8px;
      color: var(--primary); font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s; white-space: nowrap;
    }
    .attach-upload-btn:hover { background: var(--primary-light); }

    /* ── Image lightbox ── */
    .lightbox-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.87); z-index: 500;
      align-items: center; justify-content: center; cursor: zoom-out;
    }
    .lightbox-overlay.open { display: flex; }
    .lightbox-overlay img {
      max-width: 94vw; max-height: 90vh;
      border-radius: 8px; object-fit: contain;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    /* ── Toolbar (sort / export / import) ── */
    .toolbar-row {
      padding: 10px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .toolbar-row select#sortSelect {
      padding: 7px 10px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.82rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
    }
    .toolbar-btn {
      padding: 7px 12px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--primary-dark);
      cursor: pointer;
      white-space: nowrap;
    }
    .toolbar-btn:hover { background: var(--primary-light); }

    /* ── Card cover image / actions ── */
    .card-icon { overflow: hidden; padding: 0; }
    .card-cover-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-actions { display: flex; gap: 2px; flex-shrink: 0; }
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      padding: 5px;
      border-radius: 8px;
      line-height: 1;
      transition: background 0.15s;
    }
    .icon-btn:hover { background: var(--primary-light); }

    /* ── Like button ── */
    .card-like {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 0.95rem;
    }
    .card-like .like-heart { line-height: 1; display: inline-block; transition: transform 0.15s; }
    .card-like .like-count {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted, #888);
      min-width: 8px;
      text-align: center;
    }
    .card-like.liked .like-count { color: #e0245e; }
    .card-like:active .like-heart { transform: scale(1.35); }
    .card-like.pop .like-heart { animation: heart-pop 0.3s ease; }
    @keyframes heart-pop {
      0% { transform: scale(1); }
      40% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }

    /* ── Cooking mode trigger ── */
    .cook-mode-trigger { padding: 16px 18px 0; }
    .cook-mode-btn {
      width: 100%;
      padding: 11px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .cook-mode-btn:hover { background: var(--primary-dark); }

    /* ── Cooking mode overlay ── */
    .cook-mode-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 400;
      flex-direction: column;
    }
    .cook-mode-overlay.open { display: flex; }
    .cook-mode-panel { display: flex; flex-direction: column; height: 100%; }
    .cook-mode-header {
      background: var(--primary);
      color: #fff;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .cook-mode-header h2 { font-size: 1.1rem; font-weight: 700; }
    .cook-mode-close {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      width: 32px; height: 32px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    .cook-mode-body { flex: 1; overflow-y: auto; padding: 18px; }
    .cook-mode-body section { margin-bottom: 22px; }
    .cook-list { display: flex; flex-direction: column; gap: 10px; }
    .cook-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 1.05rem;
      line-height: 1.5;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
    }
    .cook-item input { width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px; cursor: pointer; }
    .cook-item.done { opacity: 0.5; text-decoration: line-through; }
  </style>
</head>
<body>

<header>
  <h1>📖 המתכונים שלי</h1>
  <p>שמור, חפש ובשל</p>
</header>

<div class="search-bar">
  <input type="search" id="searchInput" placeholder="🔍  חיפוש מתכון, מרכיב או שלב..." />
</div>

<div class="toolbar-row">
  <select id="sortSelect" aria-label="מיון מתכונים">
    <option value="">מיון: נוספו לאחרונה</option>
    <option value="alpha">מיון: א-ב</option>
    <option value="prep">מיון: זמן הכנה</option>
  </select>
  <button id="exportBtn" class="toolbar-btn" type="button">📤 גיבוי</button>
  <label class="toolbar-btn" for="importInput">📥 ייבוא</label>
  <input type="file" id="importInput" accept="application/json" style="display:none" aria-label="ייבוא קובץ גיבוי" />
</div>

<div id="tagBar" class="tag-bar"></div>

<div class="recipe-list" id="recipeList"></div>

<button id="fab" title="הוסף מתכון">+</button>

<!-- Image Lightbox -->
<div class="lightbox-overlay" id="lightboxOverlay">
  <img src="" alt="" />
</div>

<!-- Cooking Mode -->
<div class="cook-mode-overlay" id="cookModeOverlay">
  <div class="cook-mode-panel">
    <div class="cook-mode-header">
      <h2 id="cookModeTitle"></h2>
      <button class="cook-mode-close" id="cookModeClose" aria-label="סגור מצב בישול" title="סגור">✕</button>
    </div>
    <div class="cook-mode-body" id="cookModeBody"></div>
  </div>
</div>

<!-- Add / Edit Recipe Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">➕ מתכון חדש</h2>
    <div class="form-group">
      <label>שם המתכון *</label>
      <input type="text" id="newTitle" placeholder="למשל: עוגת שוקולד" />
    </div>
    <div class="form-group">
      <label>אמוג׳י / סמל</label>
      <input type="text" id="newEmoji" placeholder="🍰" maxlength="4" />
    </div>
    <div class="form-group">
      <label>מרכיבים (שורה אחת לכל מרכיב, פורמט: שם | כמות)</label>
      <textarea id="newIngredients" rows="5" placeholder="קמח | 500 גרם&#10;ביצים | 3&#10;חמאה | 200 גרם"></textarea>
    </div>
    <div class="form-group">
      <label>הוראות הכנה (שורה לכל שלב)</label>
      <textarea id="newSteps" rows="5" placeholder="מחממים תנור ל-180°C&#10;מערבבים את כל המרכיבים&#10;אופים 35 דקות"></textarea>
    </div>
    <div class="form-group">
      <label>טיפ (אופציונלי)</label>
      <input type="text" id="newTip" placeholder="טיפ שימושי..." />
    </div>
    <div class="form-group">
      <label>תגיות (מופרדות בפסיק)</label>
      <input type="text" id="newTags" placeholder="אפייה, לחם, קל" />
    </div>
    <div class="form-group">
      <label>תפוקה (כמה מנות / יחידות)</label>
      <input type="text" id="newYields" placeholder="4 מנות" />
    </div>
    <div class="form-group">
      <label>זמן הכנה</label>
      <input type="text" id="newPrepTime" placeholder="20 דקות" />
    </div>
    <div class="form-group">
      <label>זמן אפייה / בישול</label>
      <input type="text" id="newCookTime" placeholder="45 דקות" />
    </div>
    <div class="form-group">
      <label>טמפרטורה</label>
      <input type="text" id="newTemp" placeholder="180°C" />
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="modalCancel">ביטול</button>
      <button class="btn-primary" id="modalSave">שמור מתכון</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'my_recipes_v1';

const BREAD_RECIPE = {
  id: 'bread_tin_30pct',
  emoji: '🍞',
  title: 'לחם תבנית – מנה מוגדלת (×1.3)',
  tags: ['אפייה', 'לחם', 'בסיסי'],
  prepTime: '20 דקות + 90 דקות התפחה',
  cookTime: '38–45 דקות',
  temp: '200°C',
  yields: '2 כיכרות בינוניות',

function loadDeletedIds() {
  try { return new Set(JSON.parse(localStorage.getItem(DELETED_KEY) || '[]')); } catch { return new Set(); }
}
function saveDeletedIds(set) {
  try { localStorage.setItem(DELETED_KEY, JSON.stringify([...set])); return true; }
  catch { return false; }
}

function loadRecipes() {
  try {
    const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    const deleted = loadDeletedIds();
    let changed = false;
    SEED_RECIPES.forEach(seed => {
      if (!stored.find(r => r.id === seed.id) && !deleted.has(seed.id)) {
        stored.unshift(seed);
        changed = true;
      }
    });
    if (changed) saveRecipes(stored);
    return stored;
  } catch {
    return [...SEED_RECIPES];
  }
}

function saveRecipes(list) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    return true;
  } catch (e) {
    alert('שמירת המתכון נכשלה — אין מקום פנוי באחסון המקומי.');
    return false;
  }
}

function deleteRecipe(id) {
  const list = loadRecipes().filter(r => r.id !== id);
  if (!saveRecipes(list)) return;
  const deleted = loadDeletedIds();
  deleted.add(id);
  saveDeletedIds(deleted);
  const allAttach = loadAllAttachments();
  if (allAttach[id]) { delete allAttach[id]; saveAllAttachments(allAttach); }
  openCards.delete(id);
  renderTagBar();
  renderRecipes();
}

/* ─── State ─── */
let activeTag = '';
let openCards = new Set();
let editingId = null;
let sortMode = '';

/* ─── Attachment storage ─── */
const ATTACH_KEY = 'my_recipes_attach_v1';
function loadAllAttachments() {
  try { return JSON.parse(localStorage.getItem(ATTACH_KEY) || '{}'); } catch { return {}; }
}
function saveAllAttachments(d) {
  try {
    localStorage.setItem(ATTACH_KEY, JSON.stringify(d));
    return true;
  } catch (e) {
    alert('שמירת הקובץ נכשלה — אין מקום פנוי באחסון המקומי. נסה למחוק קבצים מצורפים ישנים.');
    return false;
  }
}
function getAttachments(id) { return loadAllAttachments()[id] || []; }
function addAttachment(id, name, type, dataUrl) {
  const all = loadAllAttachments();
  (all[id] = all[id] || []).push({ name, type, dataUrl });
  return saveAllAttachments(all);
}
function removeAttachment(id, idx) {
  const all = loadAllAttachments();
  if (all[id]) { all[id].splice(idx, 1); saveAllAttachments(all); }
}

/* ─── Likes storage ─── */
const LIKES_KEY = 'my_recipes_likes_v1';  // { id: totalCount }
const LIKED_KEY = 'my_recipes_liked_v1';  // ids this device has liked
function loadLikes() {
  try { return JSON.parse(localStorage.getItem(LIKES_KEY) || '{}'); } catch { return {}; }
}
function saveLikes(d) {
  try { localStorage.setItem(LIKES_KEY, JSON.stringify(d)); } catch (e) {}
}
function loadLiked() {
  try { return new Set(JSON.parse(localStorage.getItem(LIKED_KEY) || '[]')); } catch { return new Set(); }
}
function saveLiked(set) {
  try { localStorage.setItem(LIKED_KEY, JSON.stringify([...set])); } catch (e) {}
}
function getLikeCount(id) { return loadLikes()[id] || 0; }
function isLiked(id) { return loadLiked().has(id); }
function toggleLike(id) {
  const likes = loadLikes();
  const liked = loadLiked();
  if (liked.has(id)) {
    liked.delete(id);
    likes[id] = Math.max(0, (likes[id] || 0) - 1);
  } else {
    liked.add(id);
    likes[id] = (likes[id] || 0) + 1;
  }
  saveLikes(likes);
  saveLiked(liked);
  return { count: likes[id], liked: liked.has(id) };
}

/* ─── Tag bar ─── */
function getAllTags(list) {
  const seen = new Set();
  list.forEach(r => (r.tags || []).forEach(t => seen.add(t)));
  return [...seen];
}

function renderTagBar() {
  const tags = getAllTags(loadRecipes());
  const bar = document.getElementById('tagBar');
  bar.innerHTML = [
    `<button class="tag-filter-btn${activeTag === '' ? ' active' : ''}" data-tag="">כל המתכונים</button>`,
    ...tags.map(t => `<button class="tag-filter-btn${activeTag === t ? ' active' : ''}" data-tag="${escHtml(t)}">${escHtml(t)}</button>`)
  ].join('');
  bar.querySelectorAll('.tag-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTag = btn.dataset.tag;
      renderTagBar();
      renderRecipes();
    });
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─── Render ─── */
function parseMinutes(str) {
  if (!str) return Infinity;
  const m = String(str).match(/\d+/);
  return m ? parseInt(m[0], 10) : Infinity;
}

function renderRecipes(filter) {
  const q = (filter !== undefined ? filter : document.getElementById('searchInput').value).trim().toLowerCase();
  const list = loadRecipes();
  const filtered = list.filter(r => {
    const matchTag = !activeTag || (r.tags || []).includes(activeTag);
    const matchQ   = !q
      || r.title.toLowerCase().includes(q)
      || (r.tags || []).some(t => t.toLowerCase().includes(q))
      || (r.ingredients || []).some(i => (i.name || '').toLowerCase().includes(q))
      || (r.steps || []).some(s => (s || '').toLowerCase().includes(q));
    return matchTag && matchQ;
  });

  if (sortMode === 'alpha') {
    filtered.sort((a, b) => a.title.localeCompare(b.title, 'he'));
  } else if (sortMode === 'prep') {
    filtered.sort((a, b) => parseMinutes(a.prepTime) - parseMinutes(b.prepTime));
  }

  const container = document.getElementById('recipeList');
  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state"><div class="emoji">🍳</div><p>לא נמצאו מתכונים תואמים</p></div>`;
    return;
  }
  container.innerHTML = filtered.map(r => buildCard(r)).join('');
  attachCardEvents(container);
}

/* ─── Build attachment section HTML ─── */
function buildAttachSection(recipeId) {
  const attachments = getAttachments(recipeId);
  const items = attachments.map((a, idx) => {
    if (a.type && a.type.startsWith('image/')) {
      return `<div class="attach-thumb-wrap">
        <img class="attach-thumb" src="${a.dataUrl}" alt="${escHtml(a.name)}" data-idx="${idx}" />
        <button class="attach-delete" data-idx="${idx}" aria-label="מחק קובץ" title="מחק">✕</button>
      </div>`;
    }
    return `<div class="attach-pdf-wrap">
      <a class="attach-pdf-card" href="${a.dataUrl}" download="${escHtml(a.name)}" onclick="event.stopPropagation()">
        <span class="pdf-icon">📄</span><span class="attach-pdf-name">${escHtml(a.name)}</span>
      </a>
      <button class="attach-delete" data-idx="${idx}" aria-label="מחק קובץ" title="מחק">✕</button>
    </div>`;
  }).join('');

  return `<div class="attach-section">
    <div class="section-title">📎 קבצים ותמונות</div>
    <div class="attach-grid">
      ${items}
      <button class="attach-upload-btn" aria-label="הוסף קובץ או תמונה">＋ הוסף קובץ<input class="attach-file-input" type="file" accept="image/*,.pdf" multiple style="display:none"/></button>
    </div>
  </div>`;
}

/* ─── Build card HTML ─── */
function buildCard(r) {
  const tags = (r.tags || []).map(t =>
    `<span class="tag${activeTag === t ? ' active-tag' : ''}" data-tag="${escHtml(t)}">${escHtml(t)}</span>`
  ).join('');
  const meta = [
    r.yields   ? `<span>🍽 ${r.yields}</span>`   : '',
    r.prepTime ? `<span>⏱ ${r.prepTime}</span>` : '',
  ].filter(Boolean).join('');

  const ingredients = (r.ingredients || []).map(i =>
    `<li><span class="name">${i.name}</span><span class="amount">${i.amount}</span></li>`
  ).join('');

  const steps = (r.steps || []).map((s, idx) =>
    `<li><span class="step-num">${idx + 1}</span><span>${s}</span></li>`
  ).join('');

  const tipHtml = r.tip
    ? `<section><div class="section-title">💡 טיפ</div><div class="tip-box">${r.tip}</div></section>` : '';

  const bakeHtml = (r.temp || r.cookTime)
    ? `<section><div class="section-title">🔥 אפייה</div><div class="bake-info">
        ${r.temp     ? `<div class="bake-pill"><span class="pill-label">טמפרטורה</span><span class="pill-val">${r.temp}</span></div>` : ''}
        ${r.cookTime ? `<div class="bake-pill"><span class="pill-label">זמן</span><span class="pill-val">${r.cookTime}</span></div>` : ''}
       </div></section>` : '';

  const coverImg = getAttachments(r.id).find(a => a.type && a.type.startsWith('image/'));
  const iconHtml = coverImg
    ? `<img class="card-cover-img" src="${coverImg.dataUrl}" alt="" />`
    : (r.emoji || '🍽');

  const hasBody = ingredients || steps;

  return `<div class="recipe-card${openCards.has(r.id) ? ' open' : ''}" data-id="${r.id}">
    <div class="card-header">
      <div class="card-icon">${iconHtml}</div>
      <div class="card-info">
        <div class="card-title">${r.title}</div>
        <div class="card-meta">${meta}</div>
      </div>
      <div class="card-actions">
        <button class="icon-btn card-like${isLiked(r.id) ? ' liked' : ''}" aria-label="אהבתי" title="אהבתי" aria-pressed="${isLiked(r.id)}">
          <span class="like-heart">${isLiked(r.id) ? '❤️' : '🤍'}</span><span class="like-count">${getLikeCount(r.id)}</span>
        </button>
        <button class="icon-btn card-edit" aria-label="ערוך מתכון" title="ערוך">✏️</button>
        <button class="icon-btn card-delete" aria-label="מחק מתכון" title="מחק">🗑️</button>
      </div>
      <span class="card-chevron" aria-hidden="true">›</span>
    </div>
    ${tags ? `<div class="card-tags">${tags}</div>` : ''}
    <div class="recipe-body">
      ${hasBody ? `<div class="cook-mode-trigger"><button class="cook-mode-btn">👨‍🍳 מצב בישול</button></div>` : ''}
      ${ingredients ? `<section><div class="section-title">🛒 מרכיבים</div><ul class="ingredient-list">${ingredients}</ul></section>` : ''}
      ${steps       ? `<section><div class="section-title">👨‍🍳 הכנה</div><ol class="step-list">${steps}</ol></section>` : ''}
      ${bakeHtml}${tipHtml}
      ${buildAttachSection(r.id)}
    </div>
  </div>`;
}

/* ─── Event wiring ─── */
function attachCardEvents(container) {
  container.querySelectorAll('.recipe-card').forEach(card => {
    const id = card.dataset.id;

    // Toggle expand via header
    card.querySelector('.card-header').addEventListener('click', () => {
      card.classList.toggle('open');
      if (card.classList.contains('open')) openCards.add(id); else openCards.delete(id);
    });

    // Tag chips → filter
    card.querySelectorAll('.card-tags .tag').forEach(tagEl => {
      tagEl.addEventListener('click', e => {
        e.stopPropagation();
        activeTag = activeTag === tagEl.dataset.tag ? '' : tagEl.dataset.tag;
        renderTagBar();
        renderRecipes();
        if (activeTag) {
          document.getElementById('tagBar')
            .querySelector(`[data-tag="${escHtml(activeTag)}"]`)
            ?.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }
      });
    });

    // Like toggle
    const likeBtn = card.querySelector('.card-like');
    if (likeBtn) {
      likeBtn.addEventListener('click', e => {
        e.stopPropagation();
        const { count, liked } = toggleLike(id);
        likeBtn.classList.toggle('liked', liked);
        likeBtn.setAttribute('aria-pressed', liked);
        likeBtn.querySelector('.like-heart').textContent = liked ? '❤️' : '🤍';
        likeBtn.querySelector('.like-count').textContent = count;
        likeBtn.classList.remove('pop');
        void likeBtn.offsetWidth; // restart animation
        likeBtn.classList.add('pop');
      });
    }

    // Edit / delete recipe
    card.querySelector('.card-edit').addEventListener('click', e => {
      e.stopPropagation();
      const recipe = loadRecipes().find(r => r.id === id);
      if (recipe) openEditModal(recipe);
    });
    card.querySelector('.card-delete').addEventListener('click', e => {
      e.stopPropagation();
      const recipe = loadRecipes().find(r => r.id === id);
      if (recipe && confirm(`למחוק את "${recipe.title}"? לא ניתן לשחזר.`)) {
        deleteRecipe(id);
      }
    });

    // Cooking mode
    const cookBtn = card.querySelector('.cook-mode-btn');
    if (cookBtn) {
      cookBtn.addEventListener('click', e => {
        e.stopPropagation();
        const recipe = loadRecipes().find(r => r.id === id);
        if (recipe) openCookMode(recipe);
      });
    }

    wireAttachSection(card, id);
  });
}

function wireAttachSection(card, id) {
  // Delete buttons
  card.querySelectorAll('.attach-delete').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (!confirm('למחוק את הקובץ?')) return;
      removeAttachment(id, parseInt(btn.dataset.idx));
      refreshAttachSection(card, id);
    });
  });

  // Image lightbox
  card.querySelectorAll('.attach-thumb').forEach(img => {
    img.addEventListener('click', e => {
      e.stopPropagation();
      const lb = document.getElementById('lightboxOverlay');
      lb.querySelector('img').src = img.src;
      lb.classList.add('open');
    });
  });

  // Upload button
  const uploadBtn = card.querySelector('.attach-upload-btn');
  const fileInput  = card.querySelector('.attach-file-input');
  if (uploadBtn && fileInput) {
    uploadBtn.addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });
    fileInput.addEventListener('change', e => {
      e.stopPropagation();
      const files = Array.from(fileInput.files);
      if (!files.length) return;
      let remaining = files.length;
      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = ev => {
          addAttachment(id, file.name, file.type, ev.target.result);
          if (--remaining === 0) refreshAttachSection(card, id);
        };
        reader.readAsDataURL(file);
      });
      fileInput.value = '';
    });
  }
}

function refreshAttachSection(card, id) {
  const old = card.querySelector('.attach-section');
  if (!old) return;
  old.outerHTML = buildAttachSection(id);
  wireAttachSection(card, id);
}

/* ─── Search / Sort ─── */
document.getElementById('searchInput').addEventListener('input', e => {
  renderRecipes(e.target.value);
});
document.getElementById('sortSelect').addEventListener('change', e => {
  sortMode = e.target.value;
  renderRecipes();
});

/* ─── FAB / Modal (add + edit) ─── */
const overlay = document.getElementById('modalOverlay');
const MODAL_FIELDS = ['newTitle','newEmoji','newIngredients','newSteps','newTip','newTags','newYields','newPrepTime','newCookTime','newTemp'];

function closeModal() {
  overlay.classList.remove('open');
  editingId = null;
  MODAL_FIELDS.forEach(id => document.getElementById(id).value = '');
}

function openAddModal() {
  editingId = null;
  MODAL_FIELDS.forEach(id => document.getElementById(id).value = '');
  document.getElementById('modalTitle').textContent = '➕ מתכון חדש';
  document.getElementById('modalSave').textContent = 'שמור מתכון';
  overlay.classList.add('open');
}

function openEditModal(recipe) {
  editingId = recipe.id;
  document.getElementById('newTitle').value = recipe.title || '';
  document.getElementById('newEmoji').value = recipe.emoji || '';
  document.getElementById('newIngredients').value = (recipe.ingredients || []).map(i => `${i.name} | ${i.amount}`).join('\n');
  document.getElementById('newSteps').value = (recipe.steps || []).join('\n');
  document.getElementById('newTip').value = recipe.tip || '';
  document.getElementById('newTags').value = (recipe.tags || []).join(', ');
  document.getElementById('newYields').value = recipe.yields || '';
  document.getElementById('newPrepTime').value = recipe.prepTime || '';
  document.getElementById('newCookTime').value = recipe.cookTime || '';
  document.getElementById('newTemp').value = recipe.temp || '';
  document.getElementById('modalTitle').textContent = '✏️ עריכת מתכון';
  document.getElementById('modalSave').textContent = 'שמור שינויים';
  overlay.classList.add('open');
}

document.getElementById('fab').addEventListener('click', openAddModal);
document.getElementById('modalCancel').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

document.getElementById('modalSave').addEventListener('click', () => {
  const title = document.getElementById('newTitle').value.trim();
  if (!title) { alert('נא להזין שם מתכון'); return; }

  const rawIngredients = document.getElementById('newIngredients').value.trim();
  const ingredients = rawIngredients
    ? rawIngredients.split('\n').map(line => {
        const [name = '', amount = ''] = line.split('|').map(s => s.trim());
        return { name, amount };
      }).filter(i => i.name)
    : [];

  const rawSteps = document.getElementById('newSteps').value.trim();
  const steps = rawSteps ? rawSteps.split('\n').map(s => s.trim()).filter(Boolean) : [];

  const recipeData = {
    emoji: document.getElementById('newEmoji').value.trim() || '🍽',
    title,
    tags: document.getElementById('newTags').value.split(',').map(t => t.trim()).filter(Boolean),
    yields:   document.getElementById('newYields').value.trim(),
    prepTime: document.getElementById('newPrepTime').value.trim(),
    cookTime: document.getElementById('newCookTime').value.trim(),
    temp:     document.getElementById('newTemp').value.trim(),
    tip:      document.getElementById('newTip').value.trim(),
    ingredients,
    steps,
  };

  const list = loadRecipes();
  if (editingId) {
    const idx = list.findIndex(r => r.id === editingId);
    if (idx >= 0) list[idx] = { ...list[idx], ...recipeData };
  } else {
    list.unshift({ id: 'r_' + Date.now(), ...recipeData });
  }
  if (!saveRecipes(list)) return;
  renderTagBar();
  renderRecipes();
  closeModal();
});

/* ─── Lightbox ─── */
document.getElementById('lightboxOverlay').addEventListener('click', () => {
  document.getElementById('lightboxOverlay').classList.remove('open');
});

/* ─── Cooking mode ─── */
function buildCookModeBody(r) {
  const ingredients = (r.ingredients || []).map((i, idx) => `
    <label class="cook-item" data-kind="ing" data-idx="${idx}">
      <input type="checkbox" />
      <span><strong>${i.amount}</strong> ${i.name}</span>
    </label>`).join('');
  const steps = (r.steps || []).map((s, idx) => `
    <label class="cook-item" data-kind="step" data-idx="${idx}">
      <input type="checkbox" />
      <span>${s}</span>
    </label>`).join('');
  return `
    ${ingredients ? `<section><div class="section-title">🛒 מרכיבים</div><div class="cook-list">${ingredients}</div></section>` : ''}
    ${steps ? `<section><div class="section-title">👨‍🍳 הכנה</div><div class="cook-list">${steps}</div></section>` : ''}
  `;
}

function openCookMode(r) {
  document.getElementById('cookModeTitle').textContent = r.title;
  const body = document.getElementById('cookModeBody');
  body.innerHTML = buildCookModeBody(r);
  body.querySelectorAll('.cook-item').forEach(label => {
    const cb = label.querySelector('input');
    cb.addEventListener('change', () => label.classList.toggle('done', cb.checked));
  });
  document.getElementById('cookModeOverlay').classList.add('open');
}

document.getElementById('cookModeClose').addEventListener('click', () => {
  document.getElementById('cookModeOverlay').classList.remove('open');
});

/* ─── Export / Import ─── */
document.getElementById('exportBtn').addEventListener('click', () => {
  const data = {
    recipes: loadRecipes(),
    attachments: loadAllAttachments(),
    exportedAt: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `recipes-backup-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('importInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data.recipes)) throw new Error('invalid format');
      if (!confirm(`לייבא ${data.recipes.length} מתכונים? מתכונים עם מזהה קיים יוחלפו.`)) return;

      const existing = loadRecipes();
      data.recipes.forEach(rec => {
        const idx = existing.findIndex(r => r.id === rec.id);
        if (idx >= 0) existing[idx] = rec; else existing.unshift(rec);
      });
      if (!saveRecipes(existing)) return;

      if (data.attachments && typeof data.attachments === 'object') {
        const existingAttach = loadAllAttachments();
        Object.assign(existingAttach, data.attachments);
        saveAllAttachments(existingAttach);
      }

      renderTagBar();
      renderRecipes();
      alert('הייבוא הושלם בהצלחה');
    } catch (err) {
      alert('קובץ הגיבוי לא תקין');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

/* ─── Init ─── */
renderTagBar();
renderRecipes();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js');
  });
}
</script>
