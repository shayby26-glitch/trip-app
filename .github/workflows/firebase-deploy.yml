name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Service-account auth via the official action (replaces the deprecated
      # FIREBASE_TOKEN). Deploys the repo root to the live channel.
      - name: Deploy hosting (live channel)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SA_TRIP_PLANNER }}
          projectId: trip-planner-c6bad
          channelId: live

      # The hosting action does not deploy Realtime Database rules, so do that
      # with the CLI using the same service account.
      - name: Deploy database rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/trip-planner-sa.json
          FIREBASE_SA_TRIP_PLANNER: ${{ secrets.FIREBASE_SA_TRIP_PLANNER }}
        run: |
          printf '%s' "$FIREBASE_SA_TRIP_PLANNER" > "$GOOGLE_APPLICATION_CREDENTIALS"
          npm install -g firebase-tools
          firebase deploy --only database --project trip-planner-c6bad
        continue-on-error: true
