name: Deploy Recipe App to Firebase Hosting

on:
  push:
    branches:
      - master
    paths:
      - 'recipe-app/**'
      - '.github/workflows/firebase-deploy-recipes.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Firebase CLI
        # Pinned: firebase-tools 15.22.x regressed the hosting release call
        # ("supplied version is the current active version"). 15.20.0 is the
        # last version verified to deploy cleanly.
        run: npm install -g firebase-tools@15.20.0

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        working-directory: recipe-app
        run: firebase deploy --only hosting
