name: Deploy Recipe App to Firebase Hosting

on:
  push:
    branches:
      - master
    paths:
      - 'recipe-app/**'
      - '.github/workflows/firebase-deploy-recipes.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Service-account auth via the official action (replaces the deprecated
      # FIREBASE_TOKEN). Deploys the recipe-app folder to the live channel.
      - name: Deploy hosting (live channel)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SA_MY_RECIPES }}
          projectId: my-recipes-ef1e5
          channelId: live
          entryPoint: ./recipe-app
